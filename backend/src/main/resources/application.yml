spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cpudb?serverTimezone=UTC
    username: cpuuser
    password: cpupass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Hibernate darf Schema NUR prüfen, nie ändern
    open-in-view: false         # Kein DB-Zugriff außerhalb der Service-Transaktion
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true              # Nur für Entwicklung – in Prod raus

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
