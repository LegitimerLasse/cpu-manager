services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: cpudb
      MYSQL_USER: cpuuser
      MYSQL_PASSWORD: cpupass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-ucpuuser", "-pcpupass", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cpudb?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: cpuuser
      SPRING_DATASOURCE_PASSWORD: cpupass
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
